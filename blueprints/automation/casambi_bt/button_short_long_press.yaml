blueprint:
  name: Casambi Button Actions
  description: >-
    Versatile button automation with customizable actions for different button events.
    Note: a long press starts with a button_press event, then later a button_hold event.
    If you configure BOTH "Button Press Action" and "Long Press Started Action", a long press will run both.
    For exclusive short/long behavior (e.g. toggle on short press, dim on hold), prefer using "Short Press Action"
    (button_release) for toggles and leave "Button Press Action" empty.
  domain: automation
  input:
    unit_id:
      name: Unit ID
      description: The Casambi unit ID of your switch
      selector:
        number:
          mode: box
    button:
      name: Button Number
      description: Button number (1-4, matching Casambi app)
      default: 1
      selector:
        number:
          mode: box
    message_type:
      name: Message Type Filter (Optional)
      description: Filter by message type. Leave empty to accept any
      default: ""
      selector:
        text:
    
    # Button Press Action
    button_press_action:
      name: Button Press Action (Optional)
      description: Action when button is initially pressed down
      default: []
      selector:
        action: {}
    
    # Short Press Action (Press and Release)
    short_press_action:
      name: Short Press Action (Optional)
      description: Action on press followed by a normal release (no hold)
      default: []
      selector:
        action: {}
    
    # Long Press Started Action
    long_press_started_action:
      name: Long Press Started Action (Optional)
      description: Action when a hold event is received (button_hold)
      default: []
      selector:
        action: {}
    
    # Long Press Released Action
    long_press_released_action:
      name: Long Press Released Action (Optional)
      description: Action when button is released after long press
      default: []
      selector:
        action: {}
    
    # Continuous Hold Action
    hold_action:
      name: Continuous Hold Action (Optional)
      description: Action to repeat while button is held (requires helper)
      default: []
      selector:
        action: {}
    
    # Helper for continuous hold
    button_state_helper:
      name: Button State Helper (Optional)
      description: Input text helper for continuous hold actions. Only needed if using Continuous Hold Action
      default: ""
      selector:
        entity:
          domain: input_text
    
    # Hold repeat interval
    hold_repeat_interval:
      name: Hold Repeat Interval
      description: Milliseconds between continuous hold action repeats
      default: 200
      selector:
        number:
          min: 50
          max: 1000
          step: 50
          unit_of_measurement: ms

mode: parallel
max: 3

variables:
  message_type: !input message_type
  button_state_helper: !input button_state_helper
  hold_action: !input hold_action
  hold_repeat_interval: !input hold_repeat_interval

trigger:
  - platform: event
    event_type: casambi_bt_switch_event
    event_data:
      unit_id: !input unit_id
      button: !input button

condition:
  - condition: template
    value_template: >
      {% set message_type_filter = message_type | default('') %}
      {% set event_message_type = trigger.event.data.message_type | string %}
      {% set event_action = trigger.event.data.action %}
      {% set message_match = (message_type_filter == '') or (message_type_filter == event_message_type) %}
      
      {# Accept all relevant button events #}
      {{ message_match and event_action in ['button_press', 'button_release', 'button_hold', 'button_release_after_hold'] }}

action:
  - choose:
      # Button Press (ignored while holding)
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.action == 'button_press' and (
                   button_state_helper == '' or 
                   (states(button_state_helper) not in ['holding', 'continuous_hold'])
              ) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_press_action | length > 0 }}"
                sequence: !input button_press_action
          # Reset helper if provided
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_state_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "pressed"
      
      # Short Press (Release)
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.action == 'button_release' and
                 (button_state_helper == '' or 
                  (states(button_state_helper) != 'holding' and 
                   states(button_state_helper) != 'continuous_hold')) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ short_press_action | length > 0 }}"
                sequence: !input short_press_action
          # Reset helper
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_state_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "idle"
      
      # Long Press Started (Hold)
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.action == 'button_hold' and (
                   button_state_helper == '' or
                   (states(button_state_helper) not in ['holding', 'continuous_hold'])
              ) }}
        sequence:
          # Update helper
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_state_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "holding"
          
          # Execute long press started action
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ long_press_started_action | length > 0 }}"
                sequence: !input long_press_started_action
          
          # Start continuous hold if configured
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ hold_action | length > 0 and button_state_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "continuous_hold"
                  - repeat:
                      while:
                        - condition: state
                          entity_id: !input button_state_helper
                          state: "continuous_hold"
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ hold_action | length > 0 }}"
                              sequence: !input hold_action
                        - delay:
                            milliseconds: !input hold_repeat_interval
      
      # Long Press Released
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.action == 'button_release_after_hold' }}"
        sequence:
          # Stop continuous hold
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ button_state_helper != '' }}"
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "released"
          
          # Execute long press released action
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ long_press_released_action | length > 0 }}"
                sequence: !input long_press_released_action
      
      # Handle button_release when stuck in holding/continuous_hold state (for units that only send release events)
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.event.data.action == 'button_release' and
                 button_state_helper != '' and
                 states(button_state_helper) in ['holding', 'continuous_hold'] }}
        sequence:
          # Stop continuous hold by resetting state
          - service: input_text.set_value
            target:
              entity_id: !input button_state_helper
            data:
              value: "idle"
          
          # Execute long press released action (since this is effectively a release after hold)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ long_press_released_action | length > 0 }}"
                sequence: !input long_press_released_action
