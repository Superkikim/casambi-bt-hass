blueprint:
  name: Casambi Button Toggle and Dim
  description: Short press to toggle light, hold to dim (combines toggle and dimming functionality)
  domain: automation
  input:
    unit_id:
      name: Unit ID
      description: The Casambi unit ID of your switch
      selector:
        number:
          mode: box
    button:
      name: Button Number
      description: Button number (0-based)
      default: 0
      selector:
        number:
          mode: box
    message_type:
      name: Message Type (Optional)
      description: Filter by message type. Leave empty to accept any
      default: ""
      selector:
        text:
    target_light:
      name: Target Light
      description: The light to control
      selector:
        entity:
          domain: light
    dimming_direction:
      name: Dimming Direction
      description: Direction to dim when holding the button
      default: toggle
      selector:
        select:
          options:
            - label: "Increase Brightness"
              value: "up"
            - label: "Decrease Brightness"
              value: "down"
            - label: "Toggle Direction (if brightness > 50% dim down, otherwise dim up)"
              value: "toggle"
    dimming_step:
      name: Dimming Step
      description: How much to change brightness each step (0-255, will be converted to percentage)
      default: 25
      selector:
        number:
          min: 1
          max: 50
          mode: slider
    dimming_interval:
      name: Dimming Interval
      description: Milliseconds between each dimming step
      default: 200
      selector:
        number:
          min: 50
          max: 1000
          step: 50
          unit_of_measurement: ms
    button_state_helper:
      name: Button State Helper
      description: Input text helper to track button state (create one per button you want to control)
      selector:
        entity:
          domain: input_text
    debounce_time:
      name: Debounce Time
      description: Minimum seconds between toggle actions (prevents accidental double-triggers)
      default: 1
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: seconds

mode: parallel  # Allow multiple instances
max: 3

variables:
  message_type: !input message_type
  target_light: !input target_light
  dimming_direction: !input dimming_direction
  dimming_step: !input dimming_step
  dimming_interval: !input dimming_interval
  button_state_helper: !input button_state_helper
  debounce_time: !input debounce_time

trigger:
  - platform: event
    event_type: casambi_bt_switch_event
    event_data:
      unit_id: !input unit_id
      button: !input button

condition:
  - condition: template
    value_template: >
      {% set message_type_filter = message_type | default('') %}
      {% set event_message_type = trigger.event.data.message_type | string %}
      {% set event_action = trigger.event.data.action %}
      {% set message_match = (message_type_filter == '') or (message_type_filter == event_message_type) %}
      
      {# Accept all relevant button events #}
      {{ message_match and event_action in ['button_press', 'button_release', 'button_hold', 'button_release_after_hold'] }}

action:
  - variables:
      event_action: "{{ trigger.event.data.action }}"
      current_state: "{{ states(button_state_helper) }}"
      is_holding: "{{ current_state == 'holding' }}"
      is_release_event: "{{ event_action in ['button_release', 'button_release_after_hold'] }}"
      
  - choose:
      # Handle button press - just track state
      - conditions:
          - condition: template
            value_template: "{{ event_action == 'button_press' }}"
        sequence:
          - service: input_text.set_value
            target:
              entity_id: !input button_state_helper
            data:
              value: "pressed"
      
      # Handle button release - either short press or end of hold
      - conditions:
          - condition: template
            value_template: "{{ is_release_event }}"
        sequence:
          - choose:
              # If not in holding state, it's a short press
              - conditions:
                  - condition: template
                    value_template: "{{ not is_holding }}"
                sequence:
                  - service: light.toggle
                    target:
                      entity_id: !input target_light
              # If in holding state, just stop the hold
          # Always reset helper state on any release
          - service: input_text.set_value
            target:
              entity_id: !input button_state_helper
            data:
              value: "idle"
      
      # Handle button hold - update helper and start dimming loop
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.action == 'button_hold' }}"
        sequence:
          # Update button state to holding
          - service: input_text.set_value
            target:
              entity_id: !input button_state_helper
            data:
              value: "holding"
          
          # Determine initial direction (but don't store it in helper)
          - variables:
              light_entity: !input target_light
              direction_setting: !input dimming_direction
              current_brightness: "{{ state_attr(light_entity, 'brightness') | int(0) }}"
              direction_multiplier: >
                {% if direction_setting == 'down' %}
                  -1
                {% elif direction_setting == 'up' %}
                  1
                {% elif states(light_entity) == 'off' or current_brightness <= 127 %}
                  1
                {% else %}
                  -1
                {% endif %}
          
          # Start dimming loop
          - repeat:
              while:
                - condition: and
                  conditions:
                    - condition: state
                      entity_id: !input button_state_helper
                      state: "holding"
                    - condition: template
                      value_template: >
                        {% set light = target_light %}
                        {{ states(light) == 'on' }}
              sequence:
                - variables:
                    light_entity: !input target_light
                    dimming_step_value: !input dimming_step
                    step_pct: "{{ (dimming_step_value | default(25) / 255 * 100) | round(1) }}"
                    current_brightness: "{{ state_attr(light_entity, 'brightness') | int(255) }}"
                    # Re-calculate direction multiplier inside loop
                    direction_setting: !input dimming_direction
                    loop_direction_multiplier: >
                      {% if direction_setting == 'down' %}
                        -1
                      {% elif direction_setting == 'up' %}
                        1
                      {% elif current_brightness > 127 %}
                        -1
                      {% else %}
                        1
                      {% endif %}
                    # When dimming down and near minimum, use smaller steps
                    adjusted_step: >
                      {% if loop_direction_multiplier == -1 and current_brightness <= 16 %}
                        {{ ((current_brightness - 1) / 255 * 100) | abs }}
                      {% else %}
                        {{ step_pct }}
                      {% endif %}
                    calculated_step: "{{ adjusted_step * loop_direction_multiplier }}"
                    # Check if we've hit a limit for our direction
                    at_limit: "{{ (loop_direction_multiplier == 1 and current_brightness >= 255) or (loop_direction_multiplier == -1 and current_brightness <= 1) }}"
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ not at_limit }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input target_light
                          data:
                            brightness_step_pct: "{{ calculated_step }}"
                            transition: >
                              {{ (dimming_interval | default(200)) / 1000 }}
                  default:
                    # If at limit, stop the loop by clearing helper
                    - service: input_text.set_value
                      target:
                        entity_id: !input button_state_helper
                      data:
                        value: "idle"
                - delay:
                    milliseconds: !input dimming_interval
          
          # Reset state if we hit the limits
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% set brightness = state_attr(target_light, 'brightness') | int(0) %}
                      {{ brightness <= 3 or brightness >= 252 }}
                sequence:
                  - service: input_text.set_value
                    target:
                      entity_id: !input button_state_helper
                    data:
                      value: "idle"