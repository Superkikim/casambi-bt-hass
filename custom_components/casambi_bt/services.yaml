get_network_config:
  name: Get Network Configuration
  description: Get the raw network configuration data from Casambi
  fields:
    unit_id:
      name: Unit ID
      description: Optional unit ID to get configuration for a specific unit. If not provided, returns full network configuration.
      required: false
      example: 6
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    format:
      name: Format
      description: Output format for the configuration data
      required: false
      default: json
      example: yaml
      selector:
        select:
          options:
            - json
            - yaml

update_button_config:
  name: Update Button Configuration
  description: Update a button on a Casambi switch unit and immediately apply the change to the device (auto method)
  fields:
    unit_id:
      name: Unit ID
      description: The ID of the switch unit with the button to configure
      required: true
      example: 31
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    button_index:
      name: Button Index
      description: The index of the button to configure (0-based, e.g., 0 for button 1, 1 for button 2)
      required: true
      example: 1
      selector:
        number:
          min: 0
          max: 7
          mode: box
    action_type:
      name: Action Type
      description: The type of action for the button (use 'none' to disable the button)
      required: true
      default: control_unit
      example: control_unit
      selector:
        select:
          options:
            - none
            - control_unit
            - scene
            - control_group
            - all_units
            - resume_automation
            - resume_automation_group
    target_unit_id:
      name: Target Unit ID
      description: The ID of the target unit (required for control_unit action)
      required: false
      example: 18
      selector:
        number:
          min: 0
          max: 65535
          mode: box

apply_switch_config:
  name: Apply Switch Configuration
  description: Push the cached switchConfig for a unit to the device over BLE
  fields:
    unit_id:
      name: Unit ID
      description: The ID of the switch unit to apply the configuration to
      required: true
      example: 31
      selector:
        number:
          min: 0
          max: 65535
          mode: box
    method:
      name: Method
      description: Choose how to apply the configuration
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - set_parameter
            - ext
    parameter_tag:
      name: Parameter Tag
      description: Optional tag for SetParameter method (ignored for ext)
      required: false
      example: 1
      selector:
        number:
          min: 0
          max: 255
          mode: box

dump_classic_diagnostics:
  name: Dump Classic Diagnostics
  description: Log protocol/handshake details useful for Classic and mixed networks reverse engineering
  fields:
    entry_id:
      name: Entry ID
      description: Optional entry_id to target if multiple Casambi networks are configured
      required: false
      example: 01KG8AXQ57WSXCQ0W07CGMM4JP
      selector:
        text:
    include_packets:
      name: Include Packets
      description: Include TX/RX packet history in the output
      required: false
      default: true
      selector:
        boolean:
    include_network_config:
      name: Include Network Config
      description: Include full network configuration (units, groups, scenes, fixture types)
      required: false
      default: false
      selector:
        boolean:
    all_networks:
      name: All Networks
      description: Dump diagnostics for all configured networks (ignores entry_id)
      required: false
      default: false
      selector:
        boolean:

set_white_balance:
  name: Set White Balance
  description: Set the white/color balance on a Casambi RGB+TW light unit (100% = pure white, 0% = pure color).
  fields:
    entity_id:
      name: Entity
      description: The Casambi light entity to adjust.
      required: true
      example: light.etoiles_pergola
      selector:
        entity:
          domain: light
          integration: casambi_bt
    value:
      name: White balance (%)
      description: White balance percentage. 100 = pure white, 0 = pure color.
      required: true
      example: 75
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
